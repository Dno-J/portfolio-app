services:
  # ===================== PostgreSQL Database =====================
  db:
    image: postgres:15-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - portfolio_postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network

  # ===================== Backend Service =====================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: portfolio-backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - db
    restart: always
    networks:
      - app-network

  # ===================== Frontend Service =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

# ===================== Volumes =====================
volumes:
  portfolio_postgres_data:

# ===================== Shared Network =====================
networks:
  app-network:
    driver: bridge